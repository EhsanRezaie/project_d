version: '3.9'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: dating_db
    environment:
      POSTGRES_USER: dating_user
      POSTGRES_PASSWORD: dating_pass
      POSTGRES_DB: dating_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: dating_redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: dating_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console (browse buckets at http://localhost:9001)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot init container: creates the two buckets and sets photos-public
  # to allow anonymous reads. Runs once on `docker compose up`, then exits.
  # Re-running is safe — `mc mb --ignore-existing` and `mc anonymous set`
  # are both idempotent.
  #
  # NOTE: keep "minio" / "minio-init" hyphenated, not underscored — MinIO's
  # S3 hostname validation rejects underscores in the endpoint host (fails
  # with "Invalid Request (invalid hostname)") even though Docker's
  # internal DNS resolves underscored service names fine otherwise.
  minio-init:
    image: minio/mc:latest
    container_name: dating_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/photos-public &&
      mc mb --ignore-existing local/photos-private &&
      mc anonymous set download local/photos-public &&
      echo 'MinIO buckets ready: photos-public (public-read), photos-private (private)'
      "

volumes:
  postgres_data:
  minio_data: