version: '3.9'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: dating_db
    environment:
      POSTGRES_USER: dating_user
      POSTGRES_PASSWORD: dating_pass
      POSTGRES_DB: dating_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dating_user -d dating_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dating_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: dating_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console (browse buckets at http://localhost:9001)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot init container: creates the two buckets and sets photos-public
  # to allow anonymous reads. Runs once on `docker compose up`, then exits.
  # Re-running is safe — `mc mb --ignore-existing` and `mc anonymous set`
  # are both idempotent.
  #
  # NOTE: keep "minio" / "minio-init" hyphenated, not underscored — MinIO's
  # S3 hostname validation rejects underscores in the endpoint host (fails
  # with "Invalid Request (invalid hostname)") even though Docker's
  # internal DNS resolves underscored service names fine otherwise.
  minio-init:
    image: minio/mc:latest
    container_name: dating_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/photos-public &&
      mc mb --ignore-existing local/photos-private &&
      mc anonymous set download local/photos-public &&
      echo 'MinIO buckets ready: photos-public (public-read), photos-private (private)'
      "

  glitchtip-db-init:
    image: postgis/postgis:15-3.3
    container_name: dating_glitchtip_db_init
    entrypoint: >
      /bin/sh -c "
      psql postgresql://dating_user:dating_pass@db:5432/postgres -c
      \"CREATE DATABASE glitchtip OWNER dating_user;\" 2>/dev/null; exit 0
      "
    depends_on:
      db:
        condition: service_healthy

  glitchtip:
    image: glitchtip/glitchtip:latest
    container_name: dating_glitchtip
    ports:
      - "8080:80"
    environment:
      DATABASE_URL: postgres://dating_user:dating_pass@db:5432/glitchtip
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-to-a-random-string}
      PORT: 80
    depends_on:
      glitchtip-db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  glitchtip-worker:
    image: glitchtip/glitchtip:latest
    container_name: dating_glitchtip_worker
    command: python manage.py runworker --scheduler
    environment:
      DATABASE_URL: postgres://dating_user:dating_pass@db:5432/glitchtip
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-to-a-random-string}
    depends_on:
      glitchtip:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data: