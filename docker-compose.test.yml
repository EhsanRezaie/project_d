version: '3.9'

services:
  db_test:
    image: postgis/postgis:15-3.3
    container_name: dating_db_test
    environment:
      POSTGRES_USER: dating_user
      POSTGRES_PASSWORD: dating_pass
      POSTGRES_DB: dating_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dating_user -d dating_test"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis_test:
    image: redis:7-alpine
    container_name: dating_redis_test
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-test:
    image: minio/minio:latest
    container_name: dating_minio_test
    command: server /data --console-address ":9091"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9090:9000"   # S3 API
      - "9091:9091"   # Web console
    volumes:
      - minio_test_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot init container: creates the two test buckets and sets
  # photos-public-test to allow anonymous reads. Runs once, then exits.
  # Re-running is safe (mc mb --ignore-existing, mc anonymous set are
  # both idempotent).
  #
  # NOTE: the minio service is named "minio-test" (hyphen, not underscore)
  # on purpose — MinIO's S3 hostname validation rejects underscores in
  # the endpoint host (fails with "Invalid Request (invalid hostname)"),
  # even though Docker's internal DNS resolves underscored service names
  # just fine. Keep hyphens in any future MinIO-related service names.
  minio-test-init:
    image: minio/mc:latest
    container_name: dating_minio_test_init
    depends_on:
      minio-test:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio-test:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/photos-public-test &&
      mc mb --ignore-existing local/photos-private-test &&
      mc anonymous set download local/photos-public-test &&
      echo 'Test MinIO buckets ready'
      "

  glitchtip-test-db-init:
    image: postgis/postgis:15-3.3
    container_name: dating_glitchtip_test_db_init
    entrypoint: >
      /bin/sh -c "
      psql postgresql://dating_user:dating_pass@db_test:5432/postgres -c
      \"CREATE DATABASE glitchtip_test OWNER dating_user;\" 2>/dev/null; exit 0
      "
    depends_on:
      db_test:
        condition: service_healthy

  glitchtip-test:
    image: glitchtip/glitchtip:latest
    container_name: dating_glitchtip_test
    ports:
      - "8081:80"
    environment:
      DATABASE_URL: postgres://dating_user:dating_pass@db_test:5432/glitchtip_test
      REDIS_URL: redis://redis_test:6379/2
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-to-a-random-string}
      PORT: 80
    depends_on:
      glitchtip-test-db-init:
        condition: service_completed_successfully
      redis_test:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_test_data:
  minio_test_data: